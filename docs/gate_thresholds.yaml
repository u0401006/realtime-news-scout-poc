# SkillEvo 升級/回滾門檻配置
# 對應 tasks.md §5.3 — 每週 A/B 與自動回滾門檻
#
# 修改本檔後，ab_eval.py 會自動載入新門檻（TODO: 加入 YAML 載入邏輯）。
# 目前 ab_eval.py 使用 DEFAULT_THRESHOLDS 常數，與此檔案保持同步。
#
# 門檻調整原則：
#   - 初期（PoC 階段）採寬鬆門檻，避免頻繁回滾
#   - 穩定後逐步收緊，提升排序品質要求
#   - 所有變更須經 QA 審核並更新版本號

version: "1.0.0"
updated_at: "2026-03-16"

# =====================================================================
# 升級條件（全部滿足才允許升級）
# =====================================================================
upgrade:
  # 命中率差量最低門檻（candidate - baseline ≥ 此值）
  hit_rate_delta_min: 0.02        # 2%

  # NDCG@k 差量最低門檻
  ndcg_delta_min: 0.01            # 1%

  # Candidate 誤報率不得超過此值
  false_positive_rate_max: 0.30   # 30%

  # Candidate 漏稿率不得超過此值
  miss_rate_max: 0.20             # 20%

# =====================================================================
# 回滾條件（任一觸發即回滾）
# =====================================================================
rollback:
  # 命中率下降超過此值（負數表示下降幅度）
  hit_rate_delta_drop: -0.05      # 5%

  # NDCG 下降超過此值
  ndcg_delta_drop: -0.03          # 3%

  # 誤報率超過此臨界值立即回滾
  false_positive_rate_critical: 0.50  # 50%

# =====================================================================
# 觀察期設定
# =====================================================================
observation:
  # A/B 最少執行天數（不足則不判定）
  min_days: 5

  # Ground truth 最少決策筆數
  min_decisions: 50

  # 連續 HOLD 幾週後自動終止 candidate
  max_hold_weeks: 3

# =====================================================================
# 進階門檻（Phase 2 啟用）
# =====================================================================
# advanced:
#   # 統計顯著性 p-value 門檻
#   p_value_max: 0.05
#
#   # 最小效果量 (Cohen's d)
#   min_effect_size: 0.2
#
#   # 分層分析維度（按新聞類別）
#   stratify_by:
#     - category
#     - region
